services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: social_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./prisma:/docker-entrypoint-initdb.d   # optional: auto-run your SQL at startup
volumes:
  db_data:
